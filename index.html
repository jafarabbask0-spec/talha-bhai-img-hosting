<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALHA BHAI | Image Hosting</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#0b140e">
    <meta name="apple-mobile-web-app-title" content="TALHA Host">
    <link rel="apple-touch-icon" href="https://logo-png-sigma.vercel.app/TQK.png">
    <link rel="icon" type="image/png" href="https://logo-png-sigma.vercel.app/TQK.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Full Green Theme Background */
        body { 
            background: #0b140f; 
            background-image: radial-gradient(circle at 20% 30%, #12291a 0%, #0b140f 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            overflow: hidden; 
        }
        
        .dashboard { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 230, 118, 0.15); 
            border-radius: 30px; 
            padding: 35px 25px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 40px rgba(0, 230, 118, 0.05); 
            position: relative; 
        }
        
        /* Custom Logo Area */
        .logo-area img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain;
            margin-bottom: 12px; 
            filter: drop-shadow(0 0 15px rgba(0, 230, 118, 0.6)); 
        }
        
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.3); }
        p.subtitle { font-size: 13px; color: #a1b5a8; margin-bottom: 25px; }
        
        /* Green Drop Zone */
        .drop-zone { 
            width: 100%; 
            height: 180px; 
            border: 2px dashed rgba(0, 230, 118, 0.3); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.3s; 
            position: relative; 
            overflow: hidden; 
            background: rgba(0, 230, 118, 0.02);
        }
        .drop-zone:hover { border-color: #00e676; background: rgba(0, 230, 118, 0.08); box-shadow: inset 0 0 15px rgba(0,230,118,0.1); }
        #preview-img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 18px; }
        
        /* Green Upload Button */
        .btn-upload { 
            width: 100%; 
            background: linear-gradient(90deg, #00c853, #00e676); 
            color: #050a06; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 700; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3); 
            transition: 0.3s; 
            font-size: 15px;
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0, 230, 118, 0.5); }
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Telegram System Button */
        .btn-telegram {
            width: 100%;
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: #00e676;
            padding: 12px;
            border-radius: 15px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-telegram:hover {
            background: #00e676;
            color: #050a06;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.3);
        }

        /* Result Link Box */
        .result-area { margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; display: none; animation: slideIn 0.5s ease; border: 1px solid rgba(0, 230, 118, 0.1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .link-box { background: #0e1a12; padding: 12px; border-radius: 10px; font-size: 12px; color: #00e676; word-break: break-all; margin-bottom: 12px; border: 1px solid rgba(0, 230, 118, 0.2); }
        .copy-btn { background: #00c853; color: #050a06; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .copy-btn:hover { background: #00e676; }
        
        /* Toast Notification */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #0e1a12; color: #00e676; border: 1px solid #00e676; padding: 12px 25px; border-radius: 50px; font-size: 14px; transition: 0.5s; z-index: 1000; box-shadow: 0 5px 25px rgba(0,230,118,0.2); }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="logo-area">
        <img src="https://logo-png-sigma.vercel.app/TQK.png" alt="TALHA BHAI Logo">
    </div>
    
    <h1>TALHA BHAI Host</h1>
    <p class="subtitle">Secure Cloud Storage Proxy</p>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <img id="preview-img" src="">
        <i class="fa-solid fa-image" style="font-size: 35px; color: #1b3d26; margin-bottom: 10px;"></i>
        <span id="dropText" style="font-size: 13px; color: #a1b5a8;">Tap to select image</span>
    </div>

    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif, image/jpg" hidden>
    
    <button class="btn-upload" id="uploadBtn" onclick="startUpload()">
        <i class="fa-solid fa-rocket"></i> &nbsp; Secure Upload
    </button>
    
    <a href="https://t.me/TALHAQOTEXKING" target="_blank" class="btn-telegram">
        <i class="fa-brands fa-telegram" style="font-size: 18px;"></i> Contact TALHA KING
    </a>
    
    <div class="result-area" id="resultArea">
        <div class="link-box" id="finalLink"></div>
        <button class="copy-btn" onclick="copyToClipboard()"><i class="fa-solid fa-copy"></i> Copy Link</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('preview-img');
    const dropText = document.getElementById('dropText');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultArea = document.getElementById('resultArea');
    const finalLink = document.getElementById('finalLink');
    const toast = document.getElementById('toast');

    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            dropText.style.display = 'none';
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload';
            resultArea.style.display = 'none';
        }
    }

    async function startUpload() {
        const file = fileInput.files[0];
        if (!file) return showToast("⚠️ Select an image first!");

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Securing...';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const res = await response.json();

            if (res.success) {
                finalLink.innerText = res.data.url;
                resultArea.style.display = 'block';
                showToast("✅ Securely Uploaded!");
                uploadBtn.innerHTML = '<i class="fa-solid fa-check"></i> Done';
            } else {
                showToast("❌ Error: " + res.message);
                resetBtn();
            }
        } catch (e) {
            showToast("❌ Backend Connection Failed!");
            resetBtn();
        }
    }

    function showToast(msg) { 
        toast.innerText = msg; 
        toast.classList.add('show'); 
        setTimeout(() => toast.classList.remove('show'), 3000); 
    }
    
    function resetBtn() { 
        uploadBtn.disabled = false; 
        uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload'; 
    }
    
    function copyToClipboard() { 
        navigator.clipboard.writeText(finalLink.innerText); 
        showToast("📋 Link Copied!"); 
    }
</script>
</body>
</html>
