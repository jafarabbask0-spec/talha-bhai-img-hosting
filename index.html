<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALHA BHAI | Image Hosting</title>
    
    <link rel="icon" type="image/png" href="https://logo-png-sigma.vercel.app/TQK.png">
    <link rel="apple-touch-icon" href="https://logo-png-sigma.vercel.app/TQK.png">
    <meta name="apple-mobile-web-app-title" content="TALHA BHAI Host">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }
        
        body { 
            background: #0b0e14; 
            background-image: radial-gradient(circle at 20% 30%, #0f171e 0%, #0b0e14 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            color: white; 
            overflow-x: hidden;
            padding: 20px;
        }

        .dashboard { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 30px; 
            padding: 40px 30px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            position: relative; 
            transition: transform 0.3s ease;
        }

        .logo-area {
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .logo-area img { 
            width: 90px; 
            height: 90px; 
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.6));
            border-radius: 50px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        h1 { 
            font-size: 26px; 
            font-weight: 700; 
            margin-bottom: 5px; 
            background: linear-gradient(45deg, #fff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { 
            font-size: 13px; 
            color: #aaa; 
            margin-bottom: 30px; 
            letter-spacing: 0.5px;
        }

        .drop-zone { 
            width: 100%; 
            height: 200px; 
            border: 2px dashed rgba(16, 185, 129, 0.4); 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            overflow: hidden; 
            background: rgba(16, 185, 129, 0.02);
        }

        .drop-zone:hover, .drop-zone.drag-over { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.08); 
            transform: scale(1.01);
        }

        #preview-img { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
            border-radius: 22px; 
            z-index: 2;
        }

        .drop-zone-content {
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .drop-zone i {
            font-size: 40px; 
            color: #10b981; 
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .btn-upload { 
            width: 100%; 
            background: linear-gradient(90deg, #10b981, #00ff88); 
            color: #0b0e14; 
            border: none; 
            padding: 16px; 
            border-radius: 18px; 
            font-weight: 700; 
            font-size: 15px;
            margin-top: 25px; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); 
            transition: all 0.3s ease; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-upload:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4); 
        }

        .btn-upload:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }

        .result-area { 
            margin-top: 25px; 
            background: rgba(0,0,0,0.3); 
            padding: 20px; 
            border-radius: 20px; 
            display: none; 
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .link-label {
            font-size: 11px;
            color: #888;
            text-align: left;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .link-box { 
            background: #12161f; 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-size: 13px; 
            color: #00ff88; 
            word-break: break-all; 
            margin-bottom: 15px; 
            border: 1px solid #1f2430; 
            text-align: left;
            user-select: all;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .copy-btn { 
            flex: 1;
            background: #238636; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover { background: #2ea043; }

        .tg-btn {
            background: #229ED9;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .tg-btn:hover { background: #24a1de; }

        .footer-credit {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
        }

        .footer-credit a {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
        }

        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #1c202c; 
            color: white; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        #toast.show { bottom: 40px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="logo-area">
        <img src="https://logo-png-sigma.vercel.app/TQK.png" alt="TALHA BHAI Logo">
    </div>
    
    <h1>TALHA BHAI Host</h1>
    <p class="subtitle">Secure Imgbb Cloud Storage Proxy</p>
    
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <img id="preview-img" src="" alt="Preview">
        <div class="drop-zone-content" id="dropContent">
            <i class="fa-solid fa-file-image"></i>
            <span id="dropText" style="font-size: 13px; color: #aaa; font-weight: 400;">Drag & drop or Click to Select Image</span>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg, image/gif" hidden>
    
    <button class="btn-upload" id="uploadBtn" onclick="startUpload()">
        <i class="fa-solid fa-rocket"></i> Secure Upload
    </button>
    
    <div class="result-area" id="resultArea">
        <span class="link-label">Your Secure SS Link:</span>
        <div class="link-box" id="finalLink"></div>
        <div class="action-btns">
            <button class="copy-btn" onclick="copyToClipboard()">
                <i class="fa-solid fa-copy"></i> Copy Link
            </button>
            <a href="https://t.me/TALHA_SCRIPTS" target="_blank" class="tg-btn">
                <i class="fa-brands fa-telegram"></i> Telegram
            </a>
        </div>
    </div>

    <div class="footer-credit">
        Powered by <a href="https://t.me/TALHA_SCRIPTS" target="_blank">@TALHA_SCRIPTS</a>
    </div>
</div>

<div id="toast"></div>

<script>
    // Yahan apni Imgbb API key dalein
    const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY_HERE"; 

    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('preview-img');
    const dropZone = document.getElementById('dropZone');
    const dropContent = document.getElementById('dropContent');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultArea = document.getElementById('resultArea');
    const finalLink = document.getElementById('finalLink');
    const toast = document.getElementById('toast');

    // Drag and Drop Logic
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        }, false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if(files.length) {
            fileInput.files = files;
            handleFileChange();
        }
    });

    fileInput.onchange = () => { handleFileChange(); };

    function handleFileChange() {
        const file = fileInput.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                showToast("⚠️ Maximum file size is 5MB!");
                fileInput.value = "";
                return;
            }
            
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            dropContent.style.opacity = '0';
            
            resetBtn();
            resultArea.style.display = 'none';
        }
    }

    async function startUpload() {
        const file = fileInput.files[0];
        if (!file) return showToast("⚠️ Please select an image first!");

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing Assets...';

        const formData = new FormData();
        formData.append('image', file);

        // Agar user ne API key change nahi ki toh live framework error handle karega aur mock mode activate karega
        if (IMGBB_API_KEY === "YOUR_IMGBB_API_KEY_HERE") {
            console.log("Mock Mode Active: Custom Imgbb API response schema used.");
            setTimeout(() => {
                // Aapka exact provider structure format mock kiya gaya hai
                const mockImgbbResponse = {
                    "data": {
                        "id": "2ndCYJK",
                        "title": file.name.split('.')[0],
                        "url_viewer": "https://ibb.co/2ndCYJK",
                        "url": previewImg.src, // Local runtime object viewer link
                        "display_url": previewImg.src,
                        "width": "800",
                        "height": "600",
                        "size": file.size.toString(),
                        "time": Math.floor(Date.now() / 1000).toString(),
                        "expiration": "0",
                        "image": {
                            "filename": file.name,
                            "name": file.name.split('.')[0],
                            "mime": file.type,
                            "extension": file.name.split('.').pop(),
                            "url": "https://i.ibb.co/w04Prt6/c1f64245afb2.gif"
                        },
                        "thumb": {
                            "filename": file.name,
                            "name": file.name.split('.')[0],
                            "mime": file.type,
                            "extension": file.name.split('.').pop(),
                            "url": "https://i.ibb.co/2ndCYJK/c1f64245afb2.gif"
                        },
                        "medium": {
                            "filename": file.name,
                            "name": file.name.split('.')[0],
                            "mime": file.type,
                            "extension": file.name.split('.').pop(),
                            "url": "https://i.ibb.co/98W13PY/c1f64245afb2.gif"
                        },
                        "delete_url": "https://ibb.co/2ndCYJK/670a7e48ddcb85ac340c717a41047e5c"
                    },
                    "success": true,
                    "status": 200
                };

                // Parsing code matches the requested response model
                finalLink.innerText = mockImgbbResponse.data.url;
                resultArea.style.display = 'block';
                showToast("✅ Local Server Mode (Mock URL loaded)");
                uploadBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Finished';
            }, 1500);
            return;
        }

        try {
            // Real Server Production Gateway via Imgbb API Request
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });

            const res = await response.json();

            if (res.success && res.data) {
                // Aapke standard api structure format data.url se dynamic path handle kiya hai
                finalLink.innerText = res.data.url;
                resultArea.style.display = 'block';
                showToast("✅ Securely Uploaded to Imgbb!");
                uploadBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Finished';
            } else {
                showToast("❌ Upload failed: " + (res.error ? res.error.message : "Error"));
                resetBtn();
            }
        } catch (e) {
            console.error(e);
            showToast("❌ Network Error: Could not connect to Imgbb");
            resetBtn();
        }
    }

    function showToast(msg) { 
        toast.innerText = msg; 
        toast.classList.add('show'); 
        setTimeout(() => toast.classList.remove('show'), 3500); 
    }
    
    function resetBtn() { 
        uploadBtn.disabled = false; 
        uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload'; 
    }
    
    function copyToClipboard() { 
        if(!finalLink.innerText) return;
        navigator.clipboard.writeText(finalLink.innerText); 
        showToast("📋 Link Copied to Clipboard!"); 
    }
</script>
</body>
</html>
