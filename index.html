<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALHA BHAI | Image Hosting</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Add to Home Screen Setup -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TALHA BHAI Host">
    <link rel="apple-touch-icon" href="https://logo-png-sigma.vercel.app/TQK.png">
    <link rel="icon" type="image/png" href="https://logo-png-sigma.vercel.app/TQK.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #050b07; background-image: radial-gradient(circle at 20% 30%, #0d2213 0%, #050b07 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        .dashboard { width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(46, 204, 113, 0.2); border-radius: 30px; padding: 40px 25px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; }
        
        /* Logo Update */
        .logo-area img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 0 10px #2ecc71); }
        
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 5px; color: #2ecc71; }
        p.subtitle { font-size: 13px; color: #a2d2a2; margin-bottom: 30px; }
        
        /* Green Drop Zone */
        .drop-zone { width: 100%; height: 180px; border: 2px dashed rgba(46, 204, 113, 0.3); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .drop-zone:hover { border-color: #2ecc71; background: rgba(46, 204, 113, 0.05); }
        #preview-img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 18px; }
        
        /* Green Buttons */
        .btn-upload { width: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 600; margin-top: 25px; cursor: pointer; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3); transition: 0.3s; }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(46, 204, 113, 0.4); }
        .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .result-area { margin-top: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; display: none; animation: slideIn 0.5s ease; border: 1px solid rgba(46, 204, 113, 0.2); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .link-box { background: #0b160e; padding: 10px; border-radius: 10px; font-size: 12px; color: #2ecc71; word-break: break-all; margin-bottom: 10px; border: 1px solid #142c1b; }
        .copy-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .copy-btn:hover { background: #2ecc71; }
        
        /* Telegram Footer */
        .telegram-footer { margin-top: 25px; font-size: 13px; }
        .telegram-footer a { color: #2ecc71; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .telegram-footer a:hover { text-decoration: underline; }

        /* Toast Message */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #1b3822; color: #2ecc71; border: 1px solid #2ecc71; padding: 12px 25px; border-radius: 50px; font-size: 14px; transition: 0.5s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- Logo Updated with URL -->
    <div class="logo-area">
        <img src="https://logo-png-sigma.vercel.app/TQK.png" alt="TALHA BHAI Logo">
    </div>
    <h1>TALHA BHAI Host</h1>
    <p class="subtitle">Secure Cloud Storage Proxy</p>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <img id="preview-img" src="">
        <i class="fa-solid fa-image" style="font-size: 30px; color: #224b31; margin-bottom: 10px;"></i>
        <span id="dropText" style="font-size: 13px; color: #8fa095;">Tap to select image</span>
    </div>

    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif, image/jpg" hidden>
    
    <button class="btn-upload" id="uploadBtn" onclick="startUpload()">
        <i class="fa-solid fa-rocket"></i> &nbsp; Secure Upload
    </button>
    
    <div class="result-area" id="resultArea">
        <div class="link-box" id="finalLink"></div>
        <button class="copy-btn" onclick="copyToClipboard()"><i class="fa-solid fa-copy"></i> Copy Link</button>
    </div>

    <!-- Telegram Support Link -->
    <div class="telegram-footer">
        <a href="https://t.me/TALHAQOTEXKING" target="_blank">
            <i class="fa-brands fa-telegram"></i> @TALHAQOTEXKING
        </a>
    </div>
</div>

<div id="toast"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('preview-img');
    const dropText = document.getElementById('dropText');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultArea = document.getElementById('resultArea');
    const finalLink = document.getElementById('finalLink');
    const toast = document.getElementById('toast');

    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            dropText.style.display = 'none';
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload';
            resultArea.style.display = 'none';
        }
    }

    async function startUpload() {
        const file = fileInput.files[0];
        if (!file) return showToast("⚠️ Select an image first!");

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Securing...';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const res = await response.json();

            if (res.success) {
                finalLink.innerText = res.data.url;
                resultArea.style.display = 'block';
                showToast("✅ Securely Uploaded!");
                uploadBtn.innerHTML = '<i class="fa-solid fa-check"></i> Done';
            } else {
                showToast("❌ Error: " + res.message);
                resetBtn();
            }
        } catch (e) {
            showToast("❌ Backend Connection Failed!");
            resetBtn();
        }
    }

    function showToast(msg) { 
        toast.innerText = msg; 
        toast.classList.add('show'); 
        setTimeout(() => toast.classList.remove('show'), 3000); 
    }
    
    function resetBtn() { 
        uploadBtn.disabled = false; 
        uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload'; 
    }
    
    function copyToClipboard() { 
        navigator.clipboard.writeText(finalLink.innerText); 
        showToast("📋 Link Copied!"); 
    }
</script>
</body>
</html>
