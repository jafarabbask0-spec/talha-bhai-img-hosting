<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALHA BHAI | Image Hosting</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TalhaHost">
    <link rel="icon" type="image/png" href="https://logo-png-sigma.vercel.app/TQK.png">
    <link rel="apple-touch-icon" href="https://logo-png-sigma.vercel.app/TQK.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Full Neon Green & Cyberpunk Dark Theme */
        body { 
            background: #06090e; 
            background-image: radial-gradient(circle at 50% 30%, #0d1b10 0%, #06090e 100%); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #ffffff; 
            overflow: hidden; 
        }
        
        .dashboard { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(6, 15, 9, 0.4); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 255, 102, 0.15); 
            border-radius: 30px; 
            padding: 35px 25px; 
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.05), inset 0 0 20px rgba(0, 255, 102, 0.02); 
            position: relative; 
        }
        
        /* Brand Custom Logo Styling */
        .logo-area {
            width: 85px;
            height: 85px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #00ff66, #00aa44);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
        }
        
        .logo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #06090e;
        }
        
        h1 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 5px; 
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }
        
        h1 span {
            color: #00ff66;
        }
        
        p.subtitle { 
            font-size: 13px; 
            color: #7a8c80; 
            margin-bottom: 25px; 
        }
        
        /* Drop Zone */
        .drop-zone { 
            width: 100%; 
            height: 180px; 
            border: 2px dashed rgba(0, 255, 102, 0.25); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            position: relative; 
            overflow: hidden; 
            background: rgba(0, 0, 0, 0.2);
        }
        
        .drop-zone:hover { 
            border-color: #00ff66; 
            background: rgba(0, 255, 102, 0.04); 
            box-shadow: inset 0 0 15px rgba(0, 255, 102, 0.05);
        }
        
        #preview-img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 18px; }
        
        /* Buttons Styling (Full Green) */
        .btn-upload { 
            width: 100%; 
            background: linear-gradient(90deg, #00ff66, #00cc52); 
            color: #000000; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 600; 
            font-size: 15px;
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0, 255, 102, 0.25); 
            transition: all 0.3s ease; 
        }
        
        .btn-upload:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0, 255, 102, 0.4); 
        }
        
        .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Result Output Area */
        .result-area { 
            margin-top: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(0, 255, 102, 0.1);
            display: none; 
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .link-box { 
            background: #0b1118; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 12px; 
            color: #00ff66; 
            word-break: break-all; 
            margin-bottom: 12px; 
            border: 1px solid rgba(0, 255, 102, 0.15); 
        }
        
        .copy-btn { 
            background: #00ff66; 
            color: #000000; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600;
            transition: 0.2s;
        }
        
        .copy-btn:hover { background: #00cc52; }
        
        /* Support & Contact Footer Badge */
        .telegram-contact {
            margin-top: 25px;
            display: inline-block;
            font-size: 12px;
            color: #7a8c80;
            text-decoration: none;
            transition: 0.3s;
        }
        
        .telegram-contact i { color: #00ff66; margin-right: 4px; }
        .telegram-contact:hover { color: #00ff66; text-shadow: 0 0 8px rgba(0, 255, 102, 0.3); }

        /* Custom Modern Toast Notification */
        #toast { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #0b1118; 
            color: #ffffff; 
            border: 1px solid #00ff66;
            padding: 12px 25px; 
            border-radius: 50px; 
            font-size: 14px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; 
            box-shadow: 0 10px 25px rgba(0, 255, 102, 0.15); 
        }
        
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="logo-area">
        <img src="https://logo-png-sigma.vercel.app/TQK.png" alt="TALHA BHAI">
    </div>
    
    <h1>TALHA BHAI <span>Host</span></h1>
    <p class="subtitle">Secure Cloud Storage Proxy</p>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <img id="preview-img" src="">
        <i class="fa-solid fa-image" style="font-size: 32px; color: rgba(0, 255, 102, 0.4); margin-bottom: 10px;"></i>
        <span id="dropText" style="font-size: 13px; color: #7a8c80;">Tap to select image</span>
    </div>

    <input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif, image/jpg" hidden>
    
    <button class="btn-upload" id="uploadBtn" onclick="startUpload()">
        <i class="fa-solid fa-rocket"></i> &nbsp; Secure Upload
    </button>
    
    <div class="result-area" id="resultArea">
        <div class="link-box" id="finalLink"></div>
        <button class="copy-btn" onclick="copyToClipboard()"><i class="fa-solid fa-copy"></i> Copy Link</button>
    </div>

    <a href="https://t.me/TALHAQOTEXKING" target="_blank" class="telegram-contact">
        <i class="fa-brands fa-telegram"></i> Developer: @TALHAQOTEXKING
    </a>
</div>

<div id="toast"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('preview-img');
    const dropText = document.getElementById('dropText');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultArea = document.getElementById('resultArea');
    const finalLink = document.getElementById('finalLink');
    const toast = document.getElementById('toast');

    // Handle Native File Object Processing
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            dropText.style.display = 'none';
            
            // Re-validate state on change
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload';
            resultArea.style.display = 'none';
        }
    }

    // Backend Core Communications
    async function startUpload() {
        const file = fileInput.files[0];
        if (!file) return showToast("⚠️ Select an image first!");

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Securing...';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            const res = await response.json();

            if (res.success) {
                finalLink.innerText = res.data.url;
                resultArea.style.display = 'block';
                showToast("✅ Securely Uploaded!");
                uploadBtn.innerHTML = '<i class="fa-solid fa-check"></i> Done';
            } else {
                showToast("❌ Error: " + res.message);
                resetBtn();
            }
        } catch (e) {
            showToast("❌ Backend Connection Failed!");
            resetBtn();
        }
    }

    function showToast(msg) { 
        toast.innerText = msg; 
        toast.classList.add('show'); 
        setTimeout(() => toast.classList.remove('show'), 3000); 
    }
    
    function resetBtn() { 
        uploadBtn.disabled = false; 
        uploadBtn.innerHTML = '<i class="fa-solid fa-rocket"></i> Secure Upload'; 
    }
    
    function copyToClipboard() { 
        navigator.clipboard.writeText(finalLink.innerText); 
        showToast("📋 Link Copied!"); 
    }
</script>
</body>
</html>
